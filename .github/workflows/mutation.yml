# Mutation testing (Stryker) — slow, advisory-only, never PR-blocking.
# Scoped to src/vim/** and src/game/** per stryker.conf.json.

name: Mutation

on:
  workflow_dispatch:
  schedule:
    - cron: '0 5 * * 1' # Mondays 05:00 UTC

permissions:
  contents: read

jobs:
  mutation:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm run mutation

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: mutation-report
          path: reports/
          retention-days: 30
