name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - run: npm run typecheck

      - run: npm test

      - run: npm run build

      # Visibility, not a gate (yet): CONTRIBUTING's law 1 says coverage must
      # not drop — this prints the numbers so a reviewer can hold that line.
      - name: Coverage report
        if: matrix.node-version == 22
        run: npm run test:coverage
